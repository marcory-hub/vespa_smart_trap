<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Slider (seeded)</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main id="root">
      <div id="stage" class="stage stage--black">
        <div id="overlay" class="overlay">
          <div id="overlayTitle" class="overlay__title">Loading…</div>
          <div id="overlaySubtitle" class="overlay__subtitle"></div>
          <div id="overlayHint" class="overlay__hint"></div>
        </div>
        <div id="contentGrid" class="contentGrid is-hidden">
          <div class="pane pane--slideshow">
            <img id="image" class="image" alt="" />
            <div id="imageLabel" class="imageLabel"></div>
          </div>
          <div class="pane pane--camera">
            <img id="cameraImage" class="cameraImage" alt="GV2 camera preview" />
            <div id="cameraInferenceLabel" class="cameraInferenceLabel">waiting_for_gv2</div>
          </div>
        </div>
        <div id="setupBanner" class="setupBanner is-hidden"></div>
        <div id="pausedBanner" class="pausedBanner is-hidden">Paused</div>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
